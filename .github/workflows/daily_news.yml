name: Daily News Aggregator Engine

on:
  schedule:
    # Triggers automatically every day at 00:00 UTC (8:00 AM Singapore Time)
    # Modify this cron string to alter your standard delivery time window.
    - cron: '0 0 * * *'
  workflow_dispatch: # Enables a manual run option directly from the GitHub Actions tab

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Initialize Runtime Environment (Python 3.11)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Provision Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser google-genai requests

    - name: Run Orchestrated Pipeline Execution
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python news_summariser.py